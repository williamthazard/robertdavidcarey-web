{% load markdown_filters %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Verdana, sans-serif;
      background-color: #222;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #222;
      padding: 20px;
    }
    a {
      color: #fff;
      text-decoration: underline;
    }
    .header {
      font-size: 1.2em;
      border-bottom: 1px dashed #666;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .content {
      line-height: 1.5;
      font-size: 0.9em;
    }
    .footer {
      font-size: 0.8em;
      color: #aaa;
      border-top: 1px dashed #666;
      padding-top: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      robertdavidcarey.com — log entry
    </div>
    <div class="content">
      <h2><a href="https://robertdavidcarey.com/log/{{ entry.slug }}/">{{ entry.title }}</a></h2>
      <br/>
      {{ entry.content_markdown|render_markdown }}
    </div>
    <div class="footer">
      This is an automated notification from Robert David Carey's log.<br/>
      To unsubscribe instantly, <a href="{{ unsubscribe_link }}">click here</a>.
    </div>
  </div>
</body>
</html>
